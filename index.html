<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phone Media - Firebase</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
        body{background:#0a0a0a;color:#00ff41;min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center}
        .container{max-width:500px;width:100%;background:#0d0d0d;padding:30px;border-radius:16px;border:1px solid #00ff4133;text-align:center}
        .btn{width:100%;padding:14px;border:none;border-radius:8px;background:#00ff4122;color:#00ff41;font-weight:600;font-size:14px;cursor:pointer;border:1px solid #00ff4133;margin-top:10px}
        .btn:hover{background:#00ff4133}
        .btn-success{background:#00ff4133;border-color:#00ff41}
        .btn-danger{background:#ff444422;border-color:#ff4444;color:#ff4444}
        .status{padding:10px;margin:10px 0;border-radius:8px;background:#001a00;font-size:13px;color:#00ff4188}
        .preview-img{max-width:100%;max-height:250px;border-radius:8px;border:1px solid #00ff4133;margin:8px 0}
        .log{font-size:11px;color:#00ff4166;max-height:150px;overflow-y:auto;text-align:left;margin-top:10px;padding:8px;background:#000a00;border-radius:8px;border:1px solid #00ff4111}
        .log div{padding:2px 0;border-bottom:1px solid #00ff4111}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .hidden{display:none}
        .online{color:#00ff41;font-size:11px}
        .offline{color:#ff4444;font-size:11px}
        .firebase-badge{font-size:10px;color:#00ff4188;border:1px solid #00ff4122;padding:4px 12px;border-radius:20px;display:inline-block;margin-top:8px}
    </style>
</head>
<body>

<div class="container">
    <h2 style="font-size:18px;margin-bottom:4px;">📱 PHONE MEDIA</h2>
    <div style="font-size:11px;color:#00ff4188;margin-bottom:12px;">
        <span class="firebase-badge">🔥 Firebase Realtime</span>
        <span id="firebaseStatus" class="offline" style="margin-left:8px;">● Connecting...</span>
    </div>

    <div class="status" id="statusText">⏳ Select an option</div>

    <div class="grid-2">
        <button class="btn" onclick="accessCamera()">📸 Camera</button>
        <button class="btn" onclick="accessGallery()">🖼️ Gallery</button>
        <button class="btn" onclick="accessScreen()">🖥️ Screen</button>
        <button class="btn" onclick="accessFiles()">📁 Files</button>
    </div>

    <div id="previewContainer" class="hidden">
        <div id="previewContent"></div>
    </div>

    <button class="btn btn-success" onclick="sendToFirebase()" id="sendBtn" disabled>📤 Send to Firebase</button>
    <button class="btn btn-danger" onclick="testFirebase()" id="testBtn" style="margin-top:6px;">🔧 Test Firebase</button>

    <div class="log" id="log">
        <div>🟢 System ready</div>
        <div>🔥 Firebase connecting...</div>
    </div>

    <div style="font-size:10px;color:#00ff4144;margin-top:8px;" id="deviceInfo"></div>
</div>

<!-- ===== FIREBASE SDK ===== -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ==========================================
// 🔥 FIREBASE CONFIG - APNI CONFIG DAALO 🔥
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyCq5-Rrk6dh0SzqKcR8zR8zFHeGUgTj960",
    authDomain: "phone-acces-f7b2a.firebaseapp.com",
    projectId: "phone-acces-f7b2a",
    storageBucket: "phone-acces-f7b2a.firebasestorage.app",
    messagingSenderId: "561680712228",
    appId: "1:561680712228:web:77bf30d6cf328e19038eb1",
    measurementId: "G-3K3WD2EP7M"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// ==========================================
// DEVICE ID
// ==========================================
const DEVICE_ID = 'JMD-' + Math.random().toString(36).substring(2, 6).toUpperCase();
document.getElementById('deviceInfo').textContent = 'Device: ' + DEVICE_ID;

let selectedFiles = [];
let capturedImage = null;

// ==========================================
// FIREBASE STATUS
// ==========================================
function updateFirebaseStatus(connected) {
    const statusEl = document.getElementById('firebaseStatus');
    if (connected) {
        statusEl.className = 'online';
        statusEl.textContent = '🟢 Connected';
        addLog('🔥 Firebase connected');
    } else {
        statusEl.className = 'offline';
        statusEl.textContent = '🔴 Disconnected';
        addLog('❌ Firebase disconnected');
    }
}

// Check Firebase connection
database.ref('.info/connected').on('value', (snap) => {
    updateFirebaseStatus(snap.val());
});

// ==========================================
// TEST FIREBASE
// ==========================================
function testFirebase() {
    setStatus('🔧 Testing Firebase...');
    
    database.ref('test/' + DEVICE_ID).set({
        deviceId: DEVICE_ID,
        test: true,
        timestamp: new Date().toISOString(),
        message: 'Test from browser'
    }).then(() => {
        setStatus('✅ Firebase test successful!');
        addLog('✅ Test data sent to Firebase');
        toast('✅ Firebase working!');
    }).catch(err => {
        setStatus('❌ Firebase test failed: ' + err.message);
        addLog('❌ ' + err.message);
        toast('❌ Error: ' + err.message);
    });
}

// ==========================================
// LOG & STATUS
// ==========================================
function addLog(msg) {
    const log = document.getElementById('log');
    const div = document.createElement('div');
    div.textContent = '▸ ' + msg;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    if (log.children.length > 20) log.removeChild(log.children[0]);
}

function setStatus(msg) {
    document.getElementById('statusText').textContent = msg;
    addLog(msg);
}

// ==========================================
// CAMERA
// ==========================================
function accessCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('❌ Camera not supported');
        return;
    }
    setStatus('📸 Opening camera...');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(stream => {
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                stream.getTracks().forEach(t => t.stop());
                capturedImage = canvas.toDataURL('image/jpeg', 0.8);
                document.getElementById('previewContainer').classList.remove('hidden');
                document.getElementById('previewContent').innerHTML = `
                    <div style="font-size:12px;color:#00ff4188;margin:8px 0;">📸 Captured</div>
                    <img src="${capturedImage}" class="preview-img">
                    <div style="font-size:11px;color:#00ff4188;">${Math.round(capturedImage.length/1024)} KB</div>
                `;
                document.getElementById('sendBtn').disabled = false;
                setStatus('✅ Image captured!');
            }, 1000);
        })
        .catch(err => setStatus('❌ Camera denied: ' + err.message));
}

// ==========================================
// GALLERY
// ==========================================
function accessGallery() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*,video/*';
    input.multiple = true;
    input.onchange = function(e) {
        if (this.files && this.files.length > 0) {
            selectedFiles = Array.from(this.files);
            setStatus('📷 ' + selectedFiles.length + ' files selected');
            document.getElementById('sendBtn').disabled = false;
            
            const file = selectedFiles[0];
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('previewContainer').classList.remove('hidden');
                    document.getElementById('previewContent').innerHTML = `
                        <div style="font-size:12px;color:#00ff4188;margin:8px 0;">🖼️ Preview</div>
                        <img src="${ev.target.result}" class="preview-img">
                        <div style="font-size:11px;color:#00ff4188;">${file.name} (${Math.round(file.size/1024)} KB)</div>
                    `;
                };
                reader.readAsDataURL(file);
            }
        }
    };
    input.click();
    setStatus('📷 Opening gallery...');
}

// ==========================================
// SCREEN
// ==========================================
function accessScreen() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        setStatus('❌ Screen not supported');
        return;
    }
    setStatus('🖥️ Select screen...');
    navigator.mediaDevices.getDisplayMedia({ video: true, audio: false })
        .then(stream => {
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
                canvas.getContext('2d').drawImage(video, 0, 0);
                stream.getTracks().forEach(t => t.stop());
                capturedImage = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('previewContainer').classList.remove('hidden');
                document.getElementById('previewContent').innerHTML = `
                    <div style="font-size:12px;color:#00ff4188;margin:8px 0;">🖥️ Screen</div>
                    <img src="${capturedImage}" class="preview-img">
                    <div style="font-size:11px;color:#00ff4188;">${Math.round(capturedImage.length/1024)} KB</div>
                `;
                document.getElementById('sendBtn').disabled = false;
                setStatus('✅ Screen captured!');
            }, 1500);
        })
        .catch(err => setStatus('❌ Screen cancelled: ' + err.message));
}

// ==========================================
// FILES
// ==========================================
function accessFiles() {
    const input = document.createElement('input');
    input.type = 'file';
    input.multiple = true;
    input.webkitdirectory = true;
    input.onchange = function(e) {
        if (this.files && this.files.length > 0) {
            selectedFiles = Array.from(this.files);
            setStatus('📁 ' + selectedFiles.length + ' files selected');
            document.getElementById('sendBtn').disabled = false;
        }
    };
    input.click();
    setStatus('📁 Select files...');
}

// ==========================================
// SEND TO FIREBASE
// ==========================================
function sendToFirebase() {
    if (!selectedFiles.length && !capturedImage) {
        setStatus('❌ No data to send');
        return;
    }

    setStatus('📤 Sending to Firebase...');
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('sendBtn').textContent = '⏳ Sending...';

    const data = {
        deviceId: DEVICE_ID,
        timestamp: new Date().toISOString(),
        image: capturedImage || null,
        files: selectedFiles.map(f => ({ name: f.name, size: f.size, type: f.type })),
        fileCount: selectedFiles.length,
        userAgent: navigator.userAgent,
        platform: navigator.platform
    };

    // Send to Firebase
    database.ref('media/' + DEVICE_ID).set(data)
        .then(() => {
            setStatus('✅ Sent to Firebase!');
            document.getElementById('sendBtn').textContent = '✅ Sent!';
            addLog('📤 ' + selectedFiles.length + ' files sent to Firebase');
            toast('✅ Data sent to Firebase!');
            
            // Also save locally
            let local = JSON.parse(localStorage.getItem('phone_media') || '{}');
            local[DEVICE_ID] = data;
            localStorage.setItem('phone_media', JSON.stringify(local));
        })
        .catch(err => {
            setStatus('❌ Firebase error: ' + err.message);
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('sendBtn').textContent = '📤 Send to Firebase';
            addLog('❌ ' + err.message);
            toast('❌ Error: ' + err.message);
        });
}

// ==========================================
// TOAST
// ==========================================
function toast(msg) {
    const t = document.createElement('div');
    t.style.cssText = `
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: #001a00; color: #00ff41; padding: 10px 20px; border-radius: 8px;
        font-size: 12px; z-index: 9999; border: 1px solid #00ff4133;
        font-family: 'Courier New', monospace;
    `;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2000);
}

// ==========================================
// AUTO SYNC
// ==========================================
function autoSync() {
    if (selectedFiles.length || capturedImage) {
        sendToFirebase();
    }
}

// Auto sync every 30 seconds
setInterval(autoSync, 30000);

console.log('📱 Phone Media - Firebase Connected');
console.log('🆔 Device:', DEVICE_ID);
console.log('🔥 Firebase DB:', firebaseConfig.databaseURL);

// Expose functions
window.accessCamera = accessCamera;
window.accessGallery = accessGallery;
window.accessScreen = accessScreen;
window.accessFiles = accessFiles;
window.sendToFirebase = sendToFirebase;
window.testFirebase = testFirebase;
</script>
</body>
</html>
