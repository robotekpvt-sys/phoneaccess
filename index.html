<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Media Access</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
        body{background:#0a0a0a;color:#00ff41;min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center}
        .container{max-width:500px;width:100%;background:#0d0d0d;padding:30px;border-radius:16px;border:1px solid #00ff4133;text-align:center}
        .btn{width:100%;padding:14px;border:none;border-radius:8px;background:#00ff4122;color:#00ff41;font-weight:600;font-size:14px;cursor:pointer;border:1px solid #00ff4133;margin-top:10px}
        .btn:hover{background:#00ff4133}
        .btn:disabled{opacity:0.4;cursor:not-allowed}
        .btn-success{background:#00ff4133;border-color:#00ff41}
        .status{padding:10px;margin:10px 0;border-radius:8px;background:#001a00;font-size:13px;color:#00ff4188}
        .preview-img{max-width:100%;max-height:250px;border-radius:8px;border:1px solid #00ff4133;margin:8px 0}
        .log{font-size:11px;color:#00ff4166;max-height:150px;overflow-y:auto;text-align:left;margin-top:10px;padding:8px;background:#000a00;border-radius:8px;border:1px solid #00ff4111}
        .log div{padding:2px 0;border-bottom:1px solid #00ff4111}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .hidden{display:none}
    </style>
</head>
<body>

<div class="container">
    <h2 style="font-size:18px;margin-bottom:8px;">📱 PHONE MEDIA</h2>
    <div style="font-size:11px;color:#00ff4188;margin-bottom:16px;">Select & send media to admin</div>

    <div class="status" id="statusText">⏳ Select an option</div>

    <div class="grid-2">
        <button class="btn" onclick="accessCamera()">📸 Camera</button>
        <button class="btn" onclick="accessGallery()">🖼️ Gallery</button>
        <button class="btn" onclick="accessScreen()">🖥️ Screen</button>
        <button class="btn" onclick="accessFiles()">📁 Files</button>
    </div>

    <div id="previewContainer" class="hidden">
        <div id="previewContent"></div>
    </div>

    <button class="btn btn-success" onclick="sendToAdmin()" id="sendBtn" disabled>📤 Send to Admin</button>

    <div class="log" id="log">
        <div>🟢 System ready</div>
        <div>📱 Select an option to access media</div>
    </div>

    <div style="font-size:10px;color:#00ff4144;margin-top:8px;" id="deviceInfo"></div>
</div>

<script>
    // ==========================================
    // 🔥 PHONE MEDIA ACCESS
    // ==========================================

    const DEVICE_ID = 'JMD-' + Math.random().toString(36).substring(2, 6).toUpperCase();
    document.getElementById('deviceInfo').textContent = 'Device: ' + DEVICE_ID;

    let selectedFiles = [];
    let capturedImage = null;

    function addLog(msg) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.textContent = '▸ ' + msg;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
        if (log.children.length > 20) log.removeChild(log.children[0]);
    }

    function setStatus(msg) {
        document.getElementById('statusText').textContent = msg;
        addLog(msg);
    }

    // ==========================================
    // CAMERA
    // ==========================================
    function accessCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            setStatus('❌ Camera not supported');
            return;
        }
        setStatus('📸 Opening camera...');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
            .then(stream => {
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    stream.getTracks().forEach(t => t.stop());
                    capturedImage = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('previewContainer').classList.remove('hidden');
                    document.getElementById('previewContent').innerHTML = `
                        <div style="font-size:12px;color:#00ff4188;margin:8px 0;">📸 Captured</div>
                        <img src="${capturedImage}" class="preview-img">
                        <div style="font-size:11px;color:#00ff4188;">${Math.round(capturedImage.length/1024)} KB</div>
                    `;
                    document.getElementById('sendBtn').disabled = false;
                    setStatus('✅ Image captured!');
                }, 1000);
            })
            .catch(err => setStatus('❌ Camera denied: ' + err.message));
    }

    // ==========================================
    // GALLERY
    // ==========================================
    function accessGallery() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.multiple = true;
        input.onchange = function(e) {
            if (this.files && this.files.length > 0) {
                selectedFiles = Array.from(this.files);
                setStatus('📷 ' + selectedFiles.length + ' files selected');
                document.getElementById('sendBtn').disabled = false;
                
                const file = selectedFiles[0];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById('previewContainer').classList.remove('hidden');
                        document.getElementById('previewContent').innerHTML = `
                            <div style="font-size:12px;color:#00ff4188;margin:8px 0;">🖼️ Preview</div>
                            <img src="${ev.target.result}" class="preview-img">
                            <div style="font-size:11px;color:#00ff4188;">${file.name} (${Math.round(file.size/1024)} KB)</div>
                        `;
                    };
                    reader.readAsDataURL(file);
                }
            }
        };
        input.click();
        setStatus('📷 Opening gallery...');
    }

    // ==========================================
    // SCREEN
    // ==========================================
    function accessScreen() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            setStatus('❌ Screen not supported');
            return;
        }
        setStatus('🖥️ Select screen...');
        navigator.mediaDevices.getDisplayMedia({ video: true, audio: false })
            .then(stream => {
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 1280;
                    canvas.height = video.videoHeight || 720;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    stream.getTracks().forEach(t => t.stop());
                    capturedImage = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('previewContainer').classList.remove('hidden');
                    document.getElementById('previewContent').innerHTML = `
                        <div style="font-size:12px;color:#00ff4188;margin:8px 0;">🖥️ Screen</div>
                        <img src="${capturedImage}" class="preview-img">
                        <div style="font-size:11px;color:#00ff4188;">${Math.round(capturedImage.length/1024)} KB</div>
                    `;
                    document.getElementById('sendBtn').disabled = false;
                    setStatus('✅ Screen captured!');
                }, 1500);
            })
            .catch(err => setStatus('❌ Screen cancelled: ' + err.message));
    }

    // ==========================================
    // FILES
    // ==========================================
    function accessFiles() {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.webkitdirectory = true;
        input.onchange = function(e) {
            if (this.files && this.files.length > 0) {
                selectedFiles = Array.from(this.files);
                setStatus('📁 ' + selectedFiles.length + ' files selected');
                document.getElementById('sendBtn').disabled = false;
            }
        };
        input.click();
        setStatus('📁 Select files...');
    }

    // ==========================================
    // SEND TO ADMIN
    // ==========================================
    function sendToAdmin() {
        const data = {
            device: DEVICE_ID,
            timestamp: new Date().toISOString(),
            image: capturedImage,
            files: selectedFiles.map(f => ({ name: f.name, size: f.size, type: f.type })),
            fileCount: selectedFiles.length
        };
        
        try {
            let allData = JSON.parse(localStorage.getItem('phone_media') || '{}');
            allData[DEVICE_ID] = data;
            allData[DEVICE_ID].lastUpdate = new Date().toISOString();
            localStorage.setItem('phone_media', JSON.stringify(allData));
            setStatus('✅ Sent to admin!');
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('sendBtn').textContent = '✅ Sent!';
            addLog('📤 Sent ' + selectedFiles.length + ' files');
            toast('✅ Sent to admin!');
        } catch(e) {
            setStatus('❌ Error: ' + e.message);
        }
    }

    function toast(msg) {
        const t = document.createElement('div');
        t.style.cssText = `
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #001a00; color: #00ff41; padding: 10px 20px; border-radius: 8px;
            font-size: 12px; z-index: 9999; border: 1px solid #00ff4133;
            font-family: 'Courier New', monospace;
        `;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2000);
    }

    console.log('📱 Phone Media Access Loaded');
    console.log('🆔 Device:', DEVICE_ID);
</script>
</body>
</html>
